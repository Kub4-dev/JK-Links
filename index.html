<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JK‑Links</title>

<!-- SEO -->
<meta name="description" content="JK‑Dev – projekty, linki, neonowe GUI, glass UI, kreatywne aplikacje.">
<meta name="keywords" content="JK-Dev, JK Links, projekty, dev, html, neon, glass ui, github pages">
<meta name="author" content="JK-Dev">
<meta name="robots" content="index, follow">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0c1418, #05080a 70%);
    color: white;
}

.wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
}

.container {
    backdrop-filter: blur(35px) saturate(180%);
    background: rgba(255, 255, 255, 0.10);
    border-radius: 28px;
    padding: 32px;
    width: 100%;
    max-width: 460px;
    border: 1px solid rgba(255,255,255,0.25);
    text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
}

h1 {
    margin-bottom: 20px;
    font-size: 30px;
    text-shadow: 0 0 12px #00e1ff;
}

.link-btn {
    margin-top: 15px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    width: 100%;
    background: linear-gradient(90deg, #00d0ff, #008cff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,200,255,0.45);
    font-size: 17px;
}

.link-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,200,255,0.8);
}

.counter {
    margin-top: 6px;
    font-size: 14px;
    opacity: 0.8;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

    <h1>JK‑Links</h1>

    <!-- DŻORDŻÓWKA -->
    <button class="link-btn" onclick="goDzordzowka()">Dżordżówka Grupa</button>
    <div id="c_dzordzowka" class="counter">Ładowanie...</div>

    <!-- PROJECT -->
    <button class="link-btn" onclick="goProject()">JK‑Dev Project</button>
    <div id="c_project" class="counter">Ładowanie...</div>

    <!-- INFO -->
    <button class="link-btn" onclick="goInfo()">JK‑Dev Info</button>
    <div id="c_info" class="counter">Ładowanie...</div>

    <!-- NOWA STRONA -->
    <button class="link-btn" onclick="alert('Nowa strona jeszcze nie istnieje')">
        Nowa strona – wkrótce
    </button>

    <div class="footer">© 2026 JK‑Dev</div>

</div>
</div>

<script>
// 🔥 LICZNIKI ODWIEDZIN (automatyczne)
function loadCounters() {
    fetch("https://api.countapi.xyz/hit/jkdev/dzordzowka")
        .then(r => r.json())
        .then(d => document.getElementById("c_dzordzowka").innerHTML =
            "Dżordżówka – licznik odwiedzin: " + d.value);

    fetch("https://api.countapi.xyz/hit/jkdev/project")
        .then(r => r.json())
        .then(d => document.getElementById("c_project").innerHTML =
            "JK‑Dev Project – licznik odwiedzin: " + d.value);

    fetch("https://api.countapi.xyz/hit/jkdev/info")
        .then(r => r.json())
        .then(d => document.getElementById("c_info").innerHTML =
            "JK‑Dev Info – licznik odwiedzin: " + d.value);
}
loadCounters();

// 🔥 KLIK → LICZNIK + PRZEJŚCIE
function goDzordzowka() {
    fetch("https://api.countapi.xyz/hit/jkdev/dzordzowka");
    window.location.href = "https://kub4-dev.github.io/dzordzowka-grupa/";
}

function goProject() {
    fetch("https://api.countapi.xyz/hit/jkdev/project");
    window.location.href = "https://kub4-dev.github.io/JK-Dev-project/";
}

function goInfo() {
    fetch("https://api.countapi.xyz/hit/jkdev/info");
    window.location.href = "https://kub4-dev.github.io/JK-Dev-inf/";
}
</script>

</body>
</html>
