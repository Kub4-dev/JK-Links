<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK‑Links</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0c1418, #05080a 70%);
    color: white;
}

.wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
}

.container {
    backdrop-filter: blur(35px) saturate(180%);
    -webkit-backdrop-filter: blur(35px) saturate(180%);
    background: rgba(255, 255, 255, 0.10);
    border-radius: 28px;
    padding: 32px;
    width: 100%;
    max-width: 460px;
    border: 1px solid rgba(255,255,255,0.25);
    text-align: center;
    box-shadow:
        0 0 60px rgba(0,0,0,0.7),
        inset 0 0 25px rgba(255,255,255,0.08);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px);}
    to { opacity: 1; transform: translateY(0);}
}

h1 {
    margin-bottom: 20px;
    font-size: 30px;
    text-shadow: 0 0 12px #00e1ff;
}

/* PRZYCISKI */
.link-btn {
    margin-top: 15px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    width: 100%;
    background: linear-gradient(90deg, #00d0ff, #008cff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,200,255,0.45);
    font-size: 17px;
}

.link-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,200,255,0.8);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}

/* POPUP */
.popup {
    position: fixed;
    top: 15px;
    left: 15px;
    right: 15px;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(0, 200, 255, 0.15);
    border: 1px solid rgba(0, 200, 255, 0.45);
    padding: 16px;
    border-radius: 16px;
    text-align: center;
    animation: slideDown 0.6s ease;
    box-shadow: 0 0 25px rgba(0,200,255,0.5);
    font-size: 15px;
}

@keyframes slideDown {
    from { transform: translateY(-40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="container">
    <h1>JK‑Links</h1>

    <button class="link-btn" onclick="window.location.href='https://kub4-dev.github.io/dzordzowka-grupa/'">
        Dżordżówka Grupa
    </button>

    <button class="link-btn" onclick="window.location.href='https://kub4-dev.github.io/JK-Dev-project/'">
        JK‑Dev Project
    </button>

    <button class="link-btn" onclick="window.location.href='https://kub4-dev.github.io/JK-Dev-inf/'">
        JK‑Dev Info
    </button>

    <button class="link-btn" onclick="alert('Nowa strona jeszcze nie istnieje')">
        Nowa strona – wkrótce
    </button>

    <div class="footer">
        © 2026 JK‑Dev
    </div>
</div>

</div>

<div class="popup" id="popup">
    Nowa aktualizacja została zastosowana pomyślnie
</div>

<script>
setTimeout(() => {
    document.getElementById("popup").style.display = "none";
}, 5000);
</script>

</body>
</html>
