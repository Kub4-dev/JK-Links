<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JK‑Links</title>

href="data:image/svg+xml,

</text>

</svg>
">

<style>
/* -------------------- GLOBAL -------------------- */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0c1418, #05080a 70%);
    color: white;
    overflow: hidden;
}

/* -------------------- INTRO -------------------- */
#intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #0c1418, #05080a 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: introFadeOut 1s ease forwards;
    animation-delay: 5s;
}

.intro-logo {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #00eaff;
    text-shadow: 0 0 12px #00eaff, 0 0 25px #00aaff;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards, pulse 2.5s ease-in-out infinite;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes pulse {
    0% { text-shadow: 0 0 12px #00eaff, 0 0 25px #00aaff; }
    50% { text-shadow: 0 0 25px #00eaff, 0 0 45px #00aaff; }
    100% { text-shadow: 0 0 12px #00eaff, 0 0 25px #00aaff; }
}

@keyframes introFadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* -------------------- STRONA -------------------- */
.wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    opacity: 0;
    animation: pageFadeIn 1.2s ease forwards;
    animation-delay: 5s;
}

@keyframes pageFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.container {
    backdrop-filter: blur(35px) saturate(180%);
    background: rgba(255, 255, 255, 0.10);
    border-radius: 28px;
    padding: 32px;
    width: 100%;
    max-width: 460px;
    border: 1px solid rgba(255,255,255,0.25);
    text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
    animation: glow 4s ease-in-out infinite;
}

@keyframes glow {
    0% { box-shadow: 0 0 60px rgba(0,0,0,0.7); }
    50% { box-shadow: 0 0 90px rgba(0,200,255,0.25); }
    100% { box-shadow: 0 0 60px rgba(0,0,0,0.7); }
}

h1 {
    margin-bottom: 20px;
    font-size: 30px;
    text-shadow: 0 0 12px #00e1ff;
}

/* -------------------- ANIMACJA PRZYCISKÓW -------------------- */
.link-btn {
    position: relative;
    overflow: hidden;
    margin-top: 15px;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(0,255,255,0.35);
    width: 100%;
    background: linear-gradient(90deg, #00d0ff, #008cff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,200,255,0.45);
    font-size: 17px;
    opacity: 0;
    transform: translateY(25px);
    animation: slideUp 0.8s ease forwards;
}

.link-btn:nth-child(2) { animation-delay: 5.3s; }
.link-btn:nth-child(3) { animation-delay: 5.5s; }
.link-btn:nth-child(4) { animation-delay: 5.7s; }

@keyframes slideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* -------------------- AUTOMATYCZNY SHINE -------------------- */
.link-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -150%;
    width: 80%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent
    );
    transform: skewX(-25deg);
    animation: shine 3s infinite ease-in-out;
}

@keyframes shine {
    0% { left: -150%; }
    50% { left: 150%; }
    100% { left: -150%; }
}

.link-btn:hover {
    transform: scale(1.05) rotateX(4deg);
    box-shadow: 0 0 35px rgba(0,200,255,0.9);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="intro-logo">JK‑Websites&JK-Dev&JK-Softwares</div>
</div>

<!-- STRONA -->
<div class="wrapper">
<div class="container">

    <h1>JK‑Links</h1>

    <button class="link-btn" onclick="window.location.href='https://kub4-dev.github.io/Login-Gui-Test/'">
        Login-Gui-Test
    </button>

    <button class="link-btn" onclick="window.location.href='https://kub4-dev.github.io/JK-Dev-inf/'">
        JK‑Dev Info
    </button>

    <button class="link-btn" onclick="alert('Nowa strona jeszcze nie istnieje')">
        Nowa strona – wkrótce
    </button>

    <div class="footer">© 2026 JK‑Websites&JK-Dev&JK-Softwares</div>

</div>
</div>

</body>
</html>
